<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chitti</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Roboto:wght@600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script defer src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="sidebar-collapsed">
    <div class="spotlight"></div>
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <button class="icon-btn" id="toggle-sidebar" aria-label="Toggle Sidebar" title="Toggle Sidebar">
                <svg class="robot-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="10" rx="2" />
                    <circle cx="12" cy="5" r="2" />
                    <path d="M12 7v4" />
                    <line x1="8" y1="16" x2="8.01" y2="16" />
                    <line x1="16" y1="16" x2="16.01" y2="16" />
                </svg>
            </button>
        </div>
        
        <div class="sidebar-content">
            <div class="topic-group">
                <h3>#ebike-hunt</h3>
                <ul>
                    <li><button>choice of front suspension</button></li>
                    <li><button>tyres</button></li>
                    <li><button>ebike or not?</button></li>
                </ul>
            </div>
            <div class="topic-group">
                <h3>#ADHD-meds</h3>
                <ul>
                    <li><button>academic research</button></li>
                    <li><button>local meds</button></li>
                </ul>
            </div>
        </div>

        <div class="sidebar-bottom">
            <button class="icon-btn" aria-label="User Profile" title="User Profile">
                <i class="ph ph-user"></i>
            </button>
        </div>
    </aside>

    <div class="main-wrapper" id="main-wrapper">

    <main class="chat-container">
        <div class="welcome-message">
            <p>How can I help you today?</p>
        </div>
    </main>

    <div class="prompt-wrapper">
        <div class="prompt-box">
            <textarea id="prompt-input" placeholder="Message Chitti..." rows="1" aria-label="Message input"></textarea>
            <div class="prompt-controls">
                <div class="left-controls">
                    <button class="icon-btn" aria-label="Add files" title="Add files">
                        <i class="ph ph-paperclip"></i>
                    </button>
                    <button class="icon-btn" aria-label="Toggle Thinking" title="Toggle Thinking">
                        <i class="ph ph-brain"></i>
                    </button>
                    <button class="icon-btn" aria-label="Toggle Memory" title="Toggle Memory">
                        <i class="ph ph-database"></i>
                    </button>
                    <div class="model-selector">
                        <select aria-label="Model selector">
                            <option>Chitti Default</option>
                            <option>Chitti Pro</option>
                        </select>
                    </div>
                </div>
                <button class="send-btn" aria-label="Send message" title="Send message">
                    <i class="ph ph-paper-plane-right"></i>
                </button>
            </div>
        </div>
    </div>
    </div>

    <script defer src="main.js"></script>
</body>
</html>
