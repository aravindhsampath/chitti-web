<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chitti Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        brand: ['Roboto', 'sans-serif'],
                    },
                    colors: {
                        app: 'var(--color-app)',
                        surface: 'var(--color-surface)',
                        surfaceHover: 'var(--color-surface-hover)',
                        primary: 'var(--color-primary)',
                        secondary: 'var(--color-secondary)',
                        accent: 'var(--color-accent)',
                        borderline: 'var(--color-border)',
                    }
            }
        }
    </script>
    <style>
        :root {
            --color-app: #EAE9E6;
            --color-surface: #FFFFFF;
            --color-surface-hover: #F7F6F4;
            --color-primary: #111111;
            --color-secondary: #4A4A45;
            --color-accent: #6366F1;
            --color-border: #DCDBD8;
        }
        
        .dark {
            --color-app: #0D0D0C;
            --color-surface: #1C1C1B;
            --color-surface-hover: #2A2A29;
            --color-primary: #E5E5E5;
            --color-secondary: #888888;
            --color-border: #262626;
        }

        body {
            background-color: var(--color-app);
            color: var(--color-primary);
            letter-spacing: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Global Film Grain */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Dark Mode Spotlight */
        .dark body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0; /* Behind content but above background */
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
        }

        /* Topbar styling */
        .topbar {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .dark .topbar {
            background-color: rgba(28, 28, 27, 0.8);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
        
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        select option {
            background-color: var(--color-surface);
            color: var(--color-primary);
        }
    </style>
</head>
<body class="h-[100dvh] flex flex-col overflow-hidden font-sans relative">

    <!-- Header -->
    <header class="w-full max-w-[1200px] mx-auto mt-2 px-4 md:px-6 z-20 shrink-0">
        <div class="h-[48px] flex items-center justify-between px-4 rounded-xl border border-borderline topbar transition-colors">
            <div class="flex items-center gap-3">
                <div class="w-6 h-6 rounded bg-primary text-app flex items-center justify-center text-sm">
                    <i class="ph-fill ph-robot"></i>
                </div>
                <h1 class="font-brand text-base md:text-lg font-bold tracking-[-0.02em]">Chitti</h1>
            </div>
            
            <div class="flex items-center">
                <!-- Theme Toggle -->
                <button id="theme-toggle" class="text-secondary hover:text-primary transition-colors flex items-center justify-center w-8 h-8 rounded-full bg-surfaceHover border border-borderline shadow-sm" title="Toggle Theme">
                    <i id="theme-toggle-icon" class="ph ph-moon text-lg"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-5 flex flex-col z-10 w-full max-w-[900px] mx-auto scroll-smooth pt-4">
        <!-- Initial empty state -->
        <div class="flex flex-col items-center justify-center h-full text-center" id="empty-state">
            <h2 class="font-brand text-xl md:text-2xl mb-1.5 tracking-[-0.02em] text-primary font-bold">Welcome to Chitti</h2>
            <p class="text-secondary text-xs max-w-sm">Provide a query to retrieve information, synthesize documents, or start a new analysis session.</p>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="p-4 md:pb-6 z-10 shrink-0 w-full max-w-[900px] mx-auto">
        <form id="chat-form" class="relative flex items-end gap-2">
            <div class="relative w-full bg-surface border border-borderline rounded-2xl flex flex-col shadow-sm focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all duration-200">
                <!-- Dense Settings Bar -->
                <div class="px-4 py-2.5 border-b border-borderline flex items-center justify-between text-xs text-secondary bg-surfaceHover/30 rounded-t-2xl">
                    <div class="flex items-center gap-5">
                        <!-- Model Selection -->
                        <div class="flex items-center gap-1.5 hover:text-primary transition-colors cursor-pointer relative group">
                            <span class="font-medium tracking-wide">gemini-flash</span>
                            <i class="ph ph-caret-down opacity-50 group-hover:opacity-100 transition-opacity"></i>
                            <select class="absolute inset-0 opacity-0 cursor-pointer w-full">
                                <option>gemini-flash</option>
                                <option>claude-3-opus</option>
                                <option>gpt-4-turbo</option>
                            </select>
                        </div>
                        
                        <!-- Thinking Level -->
                        <div class="flex items-center gap-1.5 hover:text-primary transition-colors cursor-pointer relative group">
                            <i class="ph ph-brain text-sm"></i>
                            <i class="ph ph-caret-down opacity-50 group-hover:opacity-100 transition-opacity"></i>
                            <select class="absolute inset-0 opacity-0 cursor-pointer w-full">
                                <option>min</option>
                                <option>low</option>
                                <option>med</option>
                                <option>high</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Memory Toggle -->
                    <div class="flex items-center gap-2">
                        <span class="font-medium tracking-wide">Memory</span>
                        <button type="button" id="memory-toggle" class="w-7 h-4 bg-accent rounded-full relative transition-colors focus:outline-none" title="Toggle Memory">
                            <div id="memory-knob" class="w-3 h-3 bg-white rounded-full absolute top-0.5 left-[14px] transition-transform shadow-sm"></div>
                        </button>
                    </div>
                </div>

                <div class="flex relative items-end">
                    <button type="button" class="p-3 text-secondary hover:text-primary transition-colors shrink-0 text-xl flex items-center justify-center" title="Attach Data">
                        <i class="ph ph-plus"></i>
                    </button>
                    <textarea 
                        id="chat-input" 
                        rows="1"
                        class="w-full bg-transparent pr-12 py-3 resize-none outline-none placeholder:text-secondary text-primary text-sm leading-relaxed"
                        placeholder="Send a message..."
                        style="min-height: 44px; max-height: 200px;"
                    ></textarea>
                    
                    <button type="submit" id="submit-btn" class="absolute right-2 bottom-1.5 w-8 h-8 bg-primary text-surface rounded-lg hover:opacity-90 transition-opacity text-base flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="ph ph-arrow-up font-bold"></i>
                    </button>
                </div>
            </div>
        </form>
    </footer>

    <script>
        // Theme Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleIcon = document.getElementById('theme-toggle-icon');

        function updateThemeIcon(isDark) {
            themeToggleIcon.className = isDark ? 'ph ph-sun text-lg' : 'ph ph-moon text-lg';
        }

        function setTheme(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            }
            updateThemeIcon(isDark);
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            setTheme(true);
        } else {
            setTheme(false);
        }

        themeToggleBtn.addEventListener('click', () => {
            setTheme(!document.documentElement.classList.contains('dark'));
        });

        // Memory Toggle Logic
        const memoryToggle = document.getElementById('memory-toggle');
        const memoryKnob = document.getElementById('memory-knob');
        let memoryOn = true;

        memoryToggle.addEventListener('click', () => {
            memoryOn = !memoryOn;
            if (memoryOn) {
                memoryToggle.classList.add('bg-accent');
                memoryToggle.classList.remove('bg-borderline');
                memoryKnob.classList.add('left-[14px]');
                memoryKnob.classList.remove('left-0.5');
            } else {
                memoryToggle.classList.remove('bg-accent');
                memoryToggle.classList.add('bg-borderline');
                memoryKnob.classList.remove('left-[14px]');
                memoryKnob.classList.add('left-0.5');
            }
        });

        // Auto-resize textarea
        const chatInput = document.getElementById('chat-input');
        const submitBtn = document.getElementById('submit-btn');

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 200 ? this.scrollHeight : 200) + 'px';
            submitBtn.disabled = this.value.trim().length === 0;
        });

        // Initialize button state
        submitBtn.disabled = chatInput.value.trim().length === 0;

        // Enter to submit
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (this.value.trim().length > 0) {
                    document.getElementById('chat-form').dispatchEvent(new Event('submit'));
                }
            }
        });

        // Chat Logic
        const chatForm = document.getElementById('chat-form');
        const chatContainer = document.getElementById('chat-container');
        const emptyState = document.getElementById('empty-state');

        function createMessageElement(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const msgContainer = document.createElement('div');
            msgContainer.className = `max-w-[85%] sm:max-w-[75%] flex flex-col gap-1 ${role === 'user' ? 'items-end' : 'items-start'}`;

            const label = document.createElement('span');
            label.className = 'text-[10px] text-secondary font-semibold tracking-wider uppercase';
            label.innerText = role === 'user' ? 'You' : 'Chitti';
            
            const msgBubble = document.createElement('div');
            
            if (role === 'user') {
                msgBubble.className = `px-5 py-3 rounded-2xl bg-surface text-primary shadow-sm leading-relaxed text-sm`;
            } else {
                msgBubble.className = `px-5 py-3 rounded-2xl bg-surfaceHover text-primary leading-relaxed text-sm`;
            }
            msgBubble.innerHTML = text.replace(/\n/g, '<br>');
            
            msgContainer.appendChild(label);
            msgContainer.appendChild(msgBubble);
            wrapper.appendChild(msgContainer);
            return wrapper;
        }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            if (emptyState) emptyState.style.display = 'none';

            // User message
            chatContainer.appendChild(createMessageElement('user', text));
            chatInput.value = '';
            chatInput.style.height = 'auto';
            submitBtn.disabled = true;
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Loading state
            const loadingWrapper = document.createElement('div');
            loadingWrapper.className = 'flex w-full justify-start';
            loadingWrapper.id = 'loading-indicator';
            
            const loadingMsgContainer = document.createElement('div');
            loadingMsgContainer.className = 'flex flex-col gap-1 items-start';
            
            const label = document.createElement('span');
            label.className = 'text-[10px] text-secondary font-semibold tracking-wider uppercase';
            label.innerText = 'Chitti';
            
            const loadingBubble = document.createElement('div');
            loadingBubble.className = 'px-5 py-3 rounded-2xl bg-surfaceHover flex items-center gap-2 text-secondary';
            loadingBubble.innerHTML = '<div class="w-1.5 h-1.5 rounded-full bg-current animate-ping"></div><span class="text-sm font-medium">Retrieving...</span>';
            
            loadingMsgContainer.appendChild(label);
            loadingMsgContainer.appendChild(loadingBubble);
            loadingWrapper.appendChild(loadingMsgContainer);
            
            chatContainer.appendChild(loadingWrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // AI Response
            setTimeout(() => {
                const indicator = document.getElementById('loading-indicator');
                if (indicator) indicator.remove();
                
                chatContainer.appendChild(createMessageElement('ai', text));
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 600);
        });
    </script>
</body>
</html>
